name: CI/CD
on:
  push:
    branches:
      - main
      - beta
      - renovate/**
  pull_request: null
permissions:
  contents: write
  issues: write
  pull-requests: write
jobs:
  lint-commit-messages:
    uses: vidavidorra/.github/.github/workflows/lint-commit-messages.yml@0b0ffa183299cae645f66692ed446f051257fa02 # v8.1.7
  lint:
    uses: vidavidorra/.github/.github/workflows/node-lint.yml@0b0ffa183299cae645f66692ed446f051257fa02 # v8.1.7
  build:
    uses: vidavidorra/.github/.github/workflows/node-build.yml@0b0ffa183299cae645f66692ed446f051257fa02 # v8.1.7
  release:
    uses: vidavidorra/.github/.github/workflows/release.yml@0b0ffa183299cae645f66692ed446f051257fa02 # v8.1.7
    needs:
      - lint-commit-messages
      - lint
      - build
    secrets:
      privateKey: ${{ secrets.RELEASE_PRIVATE_KEY }}
