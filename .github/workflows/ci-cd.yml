name: CI/CD
on:
  push:
    branches:
      - main
      - beta
      - renovate/**
  pull_request: null
permissions:
  contents: write
  issues: write
  pull-requests: write
jobs:
  lint-commit-messages:
    uses: vidavidorra/.github/.github/workflows/lint-commit-messages.yml@ed57cb22d3350c6f2d801836f54c77cb19af172c # v8.1.11
  lint:
    uses: vidavidorra/.github/.github/workflows/node-lint.yml@ed57cb22d3350c6f2d801836f54c77cb19af172c # v8.1.11
  build:
    uses: vidavidorra/.github/.github/workflows/node-build.yml@ed57cb22d3350c6f2d801836f54c77cb19af172c # v8.1.11
  release:
    uses: vidavidorra/.github/.github/workflows/release.yml@ed57cb22d3350c6f2d801836f54c77cb19af172c # v8.1.11
    needs:
      - lint-commit-messages
      - lint
      - build
    secrets:
      privateKey: ${{ secrets.RELEASE_PRIVATE_KEY }}
