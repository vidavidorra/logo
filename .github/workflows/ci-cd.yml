name: CI/CD
on:
  push:
    branches:
      - main
      - beta
      - renovate/**
  pull_request: null
permissions:
  contents: write
  issues: write
  pull-requests: write
jobs:
  lint-commit-messages:
    uses: vidavidorra/.github/.github/workflows/lint-commit-messages.yml@c84e59e194e019da3542a265aad72ab09482df63 # v8.1.20
  lint:
    uses: vidavidorra/.github/.github/workflows/node-lint.yml@c84e59e194e019da3542a265aad72ab09482df63 # v8.1.20
  build:
    uses: vidavidorra/.github/.github/workflows/node-build.yml@c84e59e194e019da3542a265aad72ab09482df63 # v8.1.20
  release:
    uses: vidavidorra/.github/.github/workflows/release.yml@c84e59e194e019da3542a265aad72ab09482df63 # v8.1.20
    needs:
      - lint-commit-messages
      - lint
      - build
    secrets:
      privateKey: ${{ secrets.RELEASE_PRIVATE_KEY }}
