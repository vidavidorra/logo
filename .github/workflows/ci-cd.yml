name: CI/CD
on:
  push:
    branches:
      - main
      - beta
      - renovate/**
  pull_request: null
permissions:
  contents: write
  issues: write
  pull-requests: write
jobs:
  lint-commit-messages:
    uses: vidavidorra/.github/.github/workflows/lint-commit-messages.yml@6b851b5837f95e18ab75a012b184a09e115270d3 # v8.1.15
  lint:
    uses: vidavidorra/.github/.github/workflows/node-lint.yml@6b851b5837f95e18ab75a012b184a09e115270d3 # v8.1.15
  build:
    uses: vidavidorra/.github/.github/workflows/node-build.yml@6b851b5837f95e18ab75a012b184a09e115270d3 # v8.1.15
  release:
    uses: vidavidorra/.github/.github/workflows/release.yml@6b851b5837f95e18ab75a012b184a09e115270d3 # v8.1.15
    needs:
      - lint-commit-messages
      - lint
      - build
    secrets:
      privateKey: ${{ secrets.RELEASE_PRIVATE_KEY }}
