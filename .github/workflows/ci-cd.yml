name: CI/CD
on:
  push:
    branches:
      - main
      - beta
      - renovate/**
  pull_request: null
permissions:
  contents: write
  issues: write
  pull-requests: write
jobs:
  lint-commit-messages:
    uses: vidavidorra/.github/.github/workflows/lint-commit-messages.yml@347f6a77f55a61187bf4eb56b53e442645645374 # v8.1.5
  lint:
    uses: vidavidorra/.github/.github/workflows/node-lint.yml@347f6a77f55a61187bf4eb56b53e442645645374 # v8.1.5
  build:
    uses: vidavidorra/.github/.github/workflows/node-build.yml@347f6a77f55a61187bf4eb56b53e442645645374 # v8.1.5
  release:
    uses: vidavidorra/.github/.github/workflows/release.yml@347f6a77f55a61187bf4eb56b53e442645645374 # v8.1.5
    needs:
      - lint-commit-messages
      - lint
      - build
    secrets:
      privateKey: ${{ secrets.RELEASE_PRIVATE_KEY }}
