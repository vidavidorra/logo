name: CI/CD
on:
  push:
    branches:
      - main
      - beta
      - renovate/**
  pull_request: null
permissions:
  contents: write
  issues: write
  pull-requests: write
jobs:
  lint-commit-messages:
    uses: vidavidorra/.github/.github/workflows/lint-commit-messages.yml@3b111a4ddfa043a3a1c2edb52488834492f98f57 # v8.1.21
  lint:
    uses: vidavidorra/.github/.github/workflows/node-lint.yml@3b111a4ddfa043a3a1c2edb52488834492f98f57 # v8.1.21
  build:
    uses: vidavidorra/.github/.github/workflows/node-build.yml@3b111a4ddfa043a3a1c2edb52488834492f98f57 # v8.1.21
  release:
    uses: vidavidorra/.github/.github/workflows/release.yml@3b111a4ddfa043a3a1c2edb52488834492f98f57 # v8.1.21
    needs:
      - lint-commit-messages
      - lint
      - build
    secrets:
      privateKey: ${{ secrets.RELEASE_PRIVATE_KEY }}
