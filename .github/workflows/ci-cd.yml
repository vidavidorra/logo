name: CI/CD
on:
  push:
    branches:
      - main
      - beta
      - renovate/**
  pull_request: null
permissions:
  contents: write
  issues: write
  pull-requests: write
jobs:
  lint-commit-messages:
    uses: vidavidorra/.github/.github/workflows/lint-commit-messages.yml@0868599570281f6e9fb629b555112bb5d25214e7 # v8.1.19
  lint:
    uses: vidavidorra/.github/.github/workflows/node-lint.yml@0868599570281f6e9fb629b555112bb5d25214e7 # v8.1.19
  build:
    uses: vidavidorra/.github/.github/workflows/node-build.yml@0868599570281f6e9fb629b555112bb5d25214e7 # v8.1.19
  release:
    uses: vidavidorra/.github/.github/workflows/release.yml@0868599570281f6e9fb629b555112bb5d25214e7 # v8.1.19
    needs:
      - lint-commit-messages
      - lint
      - build
    secrets:
      privateKey: ${{ secrets.RELEASE_PRIVATE_KEY }}
